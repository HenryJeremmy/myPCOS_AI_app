[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && pip uninstall -y opencv-python",
  ". /opt/venv/bin/activate && pip install --force-reinstall opencv-python-headless==4.12.0.88"
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
